name: Daily LinkedIn Post

# AgentRouter blocks GitHub cloud servers — posting only works locally.
# Use: scripts/install-scheduler.ps1  (daily 1 PM on your PC)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Cloud runner not supported
        run: |
          echo "::error::GitHub cloud runners cannot use AgentRouter."
          echo "Your bot works locally. Run this on your PC instead:"
          echo "  cd linkedin-bot"
          echo "  npm run post-now"
          echo ""
          echo "For daily automation, use Windows Task Scheduler:"
          echo "  .\\scripts\\install-scheduler.ps1"
          exit 1
